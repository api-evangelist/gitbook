      operations:
      - name: duplicatespace
        method: POST
        description: GitBook Duplicate a space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: spaces-spaceId-move
      path: /spaces/{spaceId}/move
      operations:
      - name: movespace
        method: POST
        description: GitBook Move a space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
