        description: GitBook List spaces in an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createspaceinorganization
        method: POST
        description: GitBook Create a space in an organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
