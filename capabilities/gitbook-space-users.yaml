naftiko: 1.0.0-alpha2
info:
  label: GitBook API — Space Users
  description: 'GitBook API — Space Users. 3 operations. Lead operation: GitBook List space user permissions. Self-contained
    Naftiko capability covering one Gitbook business surface.'
  tags:
  - Gitbook
  - Space Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITBOOK_API_KEY: GITBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: gitbook-space-users
    baseUri: https://api.gitbook.com/v1
    description: GitBook API — Space Users business capability. Self-contained, no shared references.
    resources:
    - name: spaces-spaceId-permissions-users
      path: /spaces/{spaceId}/permissions/users
      operations:
      - name: listspaceusers
        method: GET
        description: GitBook List space user permissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: spaces-spaceId-permissions-users-userId
      path: /spaces/{spaceId}/permissions/users/{userId}
      operations:
      - name: updatespaceuser
        method: PATCH
        description: GitBook Update space user permissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removespaceuser
        method: DELETE
        description: GitBook Remove a space user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: gitbook-space-users-rest
    port: 8080
    description: REST adapter for GitBook API — Space Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/spaces/{spaceid}/permissions/users
      name: spaces-spaceid-permissions-users
      description: REST surface for spaces-spaceId-permissions-users.
      operations:
      - method: GET
        name: listspaceusers
        description: GitBook List space user permissions
        call: gitbook-space-users.listspaceusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spaces/{spaceid}/permissions/users/{userid}
      name: spaces-spaceid-permissions-users-userid
      description: REST surface for spaces-spaceId-permissions-users-userId.
      operations:
      - method: PATCH
        name: updatespaceuser
        description: GitBook Update space user permissions
        call: gitbook-space-users.updatespaceuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removespaceuser
        description: GitBook Remove a space user
        call: gitbook-space-users.removespaceuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gitbook-space-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitBook API — Space Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: gitbook-list-space-user-permissions
      description: GitBook List space user permissions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitbook-space-users.listspaceusers
      outputParameters:
      - type: object
        mapping: $.
    - name: gitbook-update-space-user-permissions
      description: GitBook Update space user permissions
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gitbook-space-users.updatespaceuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gitbook-remove-space-user
      description: GitBook Remove a space user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gitbook-space-users.removespaceuser
      outputParameters:
      - type: object
        mapping: $.
