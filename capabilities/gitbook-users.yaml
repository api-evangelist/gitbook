naftiko: 1.0.0-alpha2
info:
  label: GitBook API — Users
  description: 'GitBook API — Users. 2 operations. Lead operation: GitBook Get the authenticated user. Self-contained Naftiko
    capability covering one Gitbook business surface.'
  tags:
  - Gitbook
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITBOOK_API_KEY: GITBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: gitbook-users
    baseUri: https://api.gitbook.com/v1
    description: GitBook API — Users business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: getcurrentuser
        method: GET
        description: GitBook Get the authenticated user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: getuserbyid
        method: GET
        description: GitBook Get a user by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GITBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: gitbook-users-rest
    port: 8080
    description: REST adapter for GitBook API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: getcurrentuser
        description: GitBook Get the authenticated user
        call: gitbook-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: getuserbyid
        description: GitBook Get a user by ID
        call: gitbook-users.getuserbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gitbook-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for GitBook API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: gitbook-get-authenticated-user
      description: GitBook Get the authenticated user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitbook-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: gitbook-get-user-id
      description: GitBook Get a user by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gitbook-users.getuserbyid
      outputParameters:
      - type: object
        mapping: $.
