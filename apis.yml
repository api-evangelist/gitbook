    description: GitBook is a modern documentation platform that helps teams create, collaborate on, and publish product and
      engineering knowledge. It combines an intuitive editor with docs-as-code workflows, letting you write in rich text or
      Markdown, review changes, and version content like code. GitBook can host public docs and private knowledge bases with
      granular access control, SSO, custom domains, and analytics.
